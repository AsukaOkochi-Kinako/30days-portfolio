<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTSUKABE | おつ壁さま！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dela+Gothic+One&family=Inter:wght@400;500;600;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0D0D0D;
      --surface: #1A1A1A;
      --surface2: #222222;
      --accent: #C9FF00;
      --text: #FFFFFF;
      --text2: #888888;
      --border: #2E2E2E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 64px;
    }

    /* ── CONFETTI ── */
    #confetti-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 999;
    }

    /* ── BG GLOW ── */
    .bg-glow {
      position: fixed; top: -20%; left: 0;
      width: 100%; height: 60%;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,255,0,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── HERO ── */
    .result-hero {
      font-family: 'Dela Gothic One', 'Noto Sans JP', sans-serif;
      font-size: clamp(36px, 11.5vw, 100px);
      letter-spacing: 0.02em;
      text-align: center;
      padding: 44px 24px 8px;
      line-height: 1.05;
      color: var(--accent);
      white-space: nowrap;
      position: relative; z-index: 1;
      text-shadow: 0 0 40px rgba(201,255,0,0.25), 4px 4px 0 rgba(0,0,0,0.4);
    }
    .result-sub {
      font-size: 11px; color: var(--text2);
      letter-spacing: 5px; text-transform: uppercase;
      text-align: center; margin-bottom: 28px;
      position: relative; z-index: 1;
    }

    /* ── CARD ── */
    .card-wrap {
      padding: 0 20px; width: 100%; max-width: 480px;
      position: relative; z-index: 1;
    }
    .result-card {
      background: var(--surface);
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
    }

    /* Photo */
    .result-photo-wrap {
      position: relative; aspect-ratio: 4/3; overflow: hidden;
      background: var(--surface2);
    }
    .result-photo-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: none;
    }
    .result-photo-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }
    .result-photo-gradient {
      position: absolute; bottom: 0; left: 0; right: 0; height: 45%;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
    }
    .result-grade-badge {
      position: absolute; top: 16px; right: 16px;
      padding: 8px 22px;
      border-radius: 100px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
    }

    /* Stats */
    .result-info { padding: 22px 22px 12px; }
    .result-stat {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 0;
    }
    .result-stat + .result-stat { border-top: 1px solid var(--border); }
    .result-stat-icon { font-size: 20px; width: 28px; flex-shrink: 0; text-align: center; }
    .result-stat-label {
      font-size: 9px; color: var(--text2);
      letter-spacing: 2.5px; text-transform: uppercase;
      margin-bottom: 2px;
    }
    .result-stat-value { font-size: 15px; font-weight: 700; }
    .result-color-dot {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15); flex-shrink: 0;
    }
    .result-date {
      font-size: 11px; color: var(--text2);
      text-align: center; letter-spacing: 2px;
      padding: 10px 22px 18px;
    }

    /* ── ACTIONS ── */
    .result-actions {
      padding: 20px 20px 0; width: 100%; max-width: 480px;
      display: flex; flex-direction: column; gap: 12px;
      position: relative; z-index: 1;
    }
    .btn {
      width: 100%; padding: 18px;
      border-radius: 100px;
      font-size: 15px; font-weight: 700;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      cursor: pointer; transition: all 0.15s;
      border: none; letter-spacing: 0.5px;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: transparent; color: var(--text); border: 2px solid var(--border); }
    .btn:hover { transform: scale(1.02); }
    .btn:active { transform: scale(0.97); }

    /* ── ANIMATIONS ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-1 { animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) both; }
    .anim-2 { animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) 0.12s both; }
    .anim-3 { animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) 0.24s both; }
    .anim-4 { animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) 0.36s both; }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>
  <div class="bg-glow"></div>

  <div class="result-hero anim-1">おつ壁さま！</div>
  <div class="result-sub anim-2">GREAT CLIMB · WELL DONE</div>

  <div class="card-wrap anim-3">
    <div class="result-card">
      <!-- Photo -->
      <div class="result-photo-wrap">
        <div class="result-photo-placeholder" id="result-no-photo">🧗</div>
        <img id="result-photo" alt="クライム写真">
        <div class="result-photo-gradient"></div>
        <div class="result-grade-badge" id="result-grade-badge">–</div>
      </div>
      <!-- Stats -->
      <div class="result-info">
        <div class="result-stat">
          <span class="result-stat-icon">📍</span>
          <div>
            <div class="result-stat-label">GYM</div>
            <div class="result-stat-value" id="result-gym">–</div>
          </div>
        </div>
        <div class="result-stat">
          <span class="result-stat-icon">🎯</span>
          <div>
            <div class="result-stat-label">GRADE</div>
            <div class="result-stat-value" id="result-grade-text">–</div>
          </div>
        </div>
        <div class="result-stat">
          <div class="result-color-dot" id="result-color-dot"></div>
          <div>
            <div class="result-stat-label">TAPE COLOR</div>
            <div class="result-stat-value" id="result-color-text">–</div>
          </div>
        </div>
        <div class="result-stat" id="result-memo-row" style="display:none">
          <span class="result-stat-icon">💬</span>
          <div>
            <div class="result-stat-label">MEMO</div>
            <div class="result-stat-value" id="result-memo"
              style="font-weight:400;font-size:13px;color:var(--text2);line-height:1.5"></div>
          </div>
        </div>
      </div>
      <div class="result-date" id="result-date"></div>
    </div>
  </div>

  <div class="result-actions anim-4">
    <button class="btn btn-primary" onclick="shareResult()">📤 シェアする</button>
    <button class="btn btn-secondary" onclick="goBack()">🧗 もう一登り？</button>
  </div>

<script>
/* ── LOAD DATA ── */
let data = {};
try {
  data = JSON.parse(localStorage.getItem('otsukabe_result') || '{}');
} catch(e) {}

window.addEventListener('DOMContentLoaded', () => {
  // Photo
  if (data.photoDataURL) {
    document.getElementById('result-no-photo').style.display = 'none';
    const img = document.getElementById('result-photo');
    img.src = data.photoDataURL;
    img.style.display = 'block';
  }

  // Grade badge
  const grade = data.grade || '–';
  const badge = document.getElementById('result-grade-badge');
  badge.textContent = grade;
  if (data.colorHex) {
    badge.style.background = data.colorHex;
    badge.style.color = data.colorTextColor || '#fff';
    badge.style.backdropFilter = 'none';
  }

  // Stats
  document.getElementById('result-gym').textContent        = data.gym ? data.gym.name : '–';
  document.getElementById('result-grade-text').textContent = grade;
  document.getElementById('result-color-text').textContent = data.colorLabel || '–';
  document.getElementById('result-color-dot').style.background = data.colorHex || 'var(--border)';

  // Memo
  if (data.memo) {
    document.getElementById('result-memo').textContent = data.memo;
    document.getElementById('result-memo-row').style.display = 'flex';
  }

  // Date
  document.getElementById('result-date').textContent = data.dateStr || '';

  // Confetti
  launchConfetti();
});

/* ── SHARE ── */
function shareResult() {
  const grade = data.grade || '';
  const gym   = data.gym ? data.gym.name : '';
  const text  = `${gym ? gym + ' で' : ''}${grade ? grade + ' の壁をクリアしました！' : '壁をクリアしました！'} おつ壁さま！ #ボルダリング #OTSUKABE`;
  if (navigator.share) {
    navigator.share({ title: 'おつ壁さま！', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('テキストをコピーしました！SNSに貼り付けてシェアしよう 🧗');
    }).catch(() => alert('シェアできませんでした'));
  }
}

function goBack() {
  window.location.href = 'index.html';
}

/* ── CONFETTI ── */
let confettiRAF;
const COLORS = ['#C9FF00','#FF5C00','#FFE400','#FF4081','#00E5FF','#FFFFFF'];

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const particles = Array.from({ length: 100 }, () => ({
    x:  Math.random() * canvas.width,
    y:  -20 - Math.random() * 60,
    w:  Math.random() * 14 + 5,
    h:  Math.random() * 7 + 3,
    c:  COLORS[Math.floor(Math.random() * COLORS.length)],
    vx: (Math.random() - 0.5) * 5,
    vy: Math.random() * 4 + 2,
    rot: Math.random() * Math.PI * 2,
    rv: (Math.random() - 0.5) * 0.18,
    op: 1,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.y < canvas.height + 30) {
        alive = true;
        p.x  += p.vx; p.y += p.vy; p.vy += 0.06; p.rot += p.rv;
        if (p.y > canvas.height * 0.55)
          p.op = Math.max(0, 1 - (p.y - canvas.height * 0.55) / (canvas.height * 0.45));
        ctx.save();
        ctx.globalAlpha = p.op;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.c;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      }
    });
    if (alive) confettiRAF = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

window.addEventListener('resize', () => {
  const c = document.getElementById('confetti-canvas');
  c.width = window.innerWidth; c.height = window.innerHeight;
});
</script>
</body>
</html>
