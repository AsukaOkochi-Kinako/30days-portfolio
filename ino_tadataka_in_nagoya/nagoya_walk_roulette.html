<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名古屋 徒歩探索ルーレット 〜伊能式散歩術〜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🚶&lt;/text&gt;&lt;/svg&gt;">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:    #f4e8c1;
      --parchment:#ece0b4;
      --indigo:   #1a3a5c;
      --light-indigo: #2d5f8a;
      --vermillion: #b5332a;
      --dk-vermillion: #8c2520;
      --gold:     #c8a84b;
      --dk-gold:  #9e7b2a;
      --green:    #2d6a4f;
      --lt-green: #4a8a6f;
      --brown:    #3c2010;
      --lt-brown: #6b4226;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Serif JP','Yu Mincho','Hiragino Mincho ProN',serif;
      color: var(--brown);
      min-height: 100vh;
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse at 50% 100%, rgba(200,168,75,.09) 0%, transparent 70%),
        repeating-linear-gradient(
          45deg,
          transparent 0px,transparent 18px,
          rgba(200,168,75,.045) 18px,rgba(200,168,75,.045) 19px
        );
    }

    /* ── LAYOUT ─────────────────────────────── */
    .wrap { max-width:920px; margin:0 auto; padding:0 16px; }

    /* ── HEADER ─────────────────────────────── */
    header {
      text-align:center;
      padding:28px 20px 22px;
      position:relative;
    }

    .hdr-inner-border {
      border:2px solid var(--gold);
      padding:20px 30px 18px;
      position:relative;
    }
    .hdr-inner-border::before,
    .hdr-inner-border::after {
      content:'';
      position:absolute;
      width:14px;height:14px;
      border:2px solid var(--dk-gold);
    }
    .hdr-inner-border::before {top:-2px;left:-2px; border-right:none;border-bottom:none;}
    .hdr-inner-border::after  {bottom:-2px;right:-2px;border-left:none;border-top:none;}

    .shachihoko-row {
      display:flex; justify-content:center; align-items:flex-end;
      gap:28px; margin-bottom:12px;
    }
    .shachihoko-row svg { width:52px; height:72px; }
    .shachihoko-row .flip { transform:scaleX(-1); }

    h1 {
      font-size:clamp(1.5em,5vw,2.3em);
      font-weight:700;
      color:var(--indigo);
      letter-spacing:.12em;
      line-height:1.3;
    }
    h1 .red { color:var(--vermillion); }

    .subtitle {
      margin-top:8px;
      font-size:.82em;
      color:var(--dk-gold);
      letter-spacing:.22em;
    }

    .ebi-row {
      margin-top:10px;
      font-size:.78em;
      color:var(--lt-brown);
      letter-spacing:.1em;
    }

    /* ── WAVE DIVIDER ───────────────────────── */
    .wave {
      width:100%; overflow:hidden; line-height:0;
      margin:16px 0;
    }
    .wave svg { display:block; width:100%; height:28px; }

    /* ── CATEGORY SECTION ───────────────────── */
    .cat-section {
      background:var(--parchment);
      border:2px solid var(--gold);
      padding:18px 20px;
      margin-bottom:24px;
      text-align:center;
      position:relative;
    }
    .cat-section::before,.cat-section::after {
      content:'✦';
      position:absolute;
      top:-12px;
      background:var(--cream);
      padding:0 6px;
      font-size:1.1em;
      color:var(--gold);
    }
    .cat-section::before {left:20px;}
    .cat-section::after  {right:20px;}

    .sec-heading {
      font-size:.92em;
      color:var(--indigo);
      letter-spacing:.14em;
      margin-bottom:14px;
    }

    .cat-buttons { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }

    .cat-btn {
      padding:10px 26px;
      border:2px solid var(--indigo);
      background:transparent;
      color:var(--indigo);
      font-family:inherit;
      font-size:.9em;
      cursor:pointer;
      letter-spacing:.1em;
      transition:all .22s;
      position:relative;
    }
    .cat-btn::before,.cat-btn::after {
      content:'';
      position:absolute;
      width:7px;height:7px;
      border:1px solid var(--gold);
    }
    .cat-btn::before {top:3px;left:3px;border-right:none;border-bottom:none;}
    .cat-btn::after  {bottom:3px;right:3px;border-left:none;border-top:none;}

    .cat-btn:hover,.cat-btn.active {
      background:var(--indigo);
      color:var(--cream);
    }

    .cat-btn .note {
      display:block;
      font-size:.68em;
      opacity:.82;
      margin-top:2px;
    }

    /* ── ROULETTE SECTION ───────────────────── */
    .roulette-wrap {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:22px;
      margin-bottom:30px;
    }

    .wheel-outer {
      position:relative;
      display:inline-block;
    }

    .pointer-svg {
      position:absolute;
      top:-40px;
      left:50%;
      transform:translateX(-50%);
      z-index:10;
    }

    canvas#wheel {
      display:block;
      border-radius:50%;
      box-shadow:
        0 0 0 5px var(--gold),
        0 0 0 9px var(--indigo),
        0 12px 32px rgba(0,0,0,.35);
    }

    .spin-btn {
      padding:13px 50px;
      background:linear-gradient(135deg,var(--vermillion),var(--dk-vermillion));
      color:#fff;
      border:2px solid var(--dk-vermillion);
      font-family:inherit;
      font-size:1.1em;
      cursor:pointer;
      letter-spacing:.22em;
      transition:all .22s;
      box-shadow:0 4px 16px rgba(181,51,42,.42),inset 0 1px 0 rgba(255,255,255,.18);
      position:relative;
    }
    .spin-btn::before,.spin-btn::after {
      content:'';
      position:absolute;
      width:9px;height:9px;
      border:1px solid rgba(255,255,255,.45);
    }
    .spin-btn::before {top:4px;left:4px;border-right:none;border-bottom:none;}
    .spin-btn::after  {bottom:4px;right:4px;border-left:none;border-top:none;}

    .spin-btn:hover:not(:disabled) {
      transform:translateY(-2px);
      box-shadow:0 6px 22px rgba(181,51,42,.55),inset 0 1px 0 rgba(255,255,255,.18);
    }
    .spin-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

    .solo-note {
      font-size:.78em;
      color:var(--dk-gold);
      letter-spacing:.08em;
      margin-top:-10px;
    }

    /* ── RESULT SECTION ─────────────────────── */
    .result-section {
      display:none;
      background:var(--parchment);
      border:3px solid var(--indigo);
      padding:24px;
      position:relative;
      animation:fadeUp .8s ease;
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(18px);}
      to  {opacity:1;transform:translateY(0);}
    }
    .result-section::before {
      content:'';
      position:absolute;
      inset:6px;
      border:1px solid var(--gold);
      pointer-events:none;
    }

    .result-hdr { text-align:center; margin-bottom:18px; }

    .result-badge {
      display:inline-block;
      background:var(--vermillion);
      color:#fff;
      padding:3px 14px;
      font-size:.76em;
      letter-spacing:.15em;
      margin-bottom:8px;
    }

    .result-name {
      font-size:clamp(1.3em,4vw,1.7em);
      font-weight:700;
      color:var(--indigo);
      letter-spacing:.08em;
    }

    .result-stars {
      margin-top:8px;
      color:var(--gold);
      font-size:.95em;
      letter-spacing:8px;
    }

    .divider-gold {
      height:2px;
      background:linear-gradient(to right,transparent,var(--gold),transparent);
      margin:14px 0;
    }

    .result-body {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
      align-items:start;
    }
    @media(max-width:600px){
      .result-body {grid-template-columns:1fr;}
    }

    .result-illus {
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .result-illus svg {
      width:100%;
      max-width:290px;
      height:auto;
      border:2px solid var(--brown);
      box-shadow:4px 4px 0 var(--gold);
    }
    .illus-caption {
      font-size:.7em;
      color:var(--dk-gold);
      margin-top:7px;
      font-style:italic;
      letter-spacing:.06em;
    }

    .result-details { display:flex; flex-direction:column; gap:11px; }

    .detail-row { display:flex; gap:9px; align-items:flex-start; }

    .dtag {
      background:var(--indigo);
      color:var(--cream);
      padding:3px 9px;
      font-size:.74em;
      white-space:nowrap;
      flex-shrink:0;
      letter-spacing:.04em;
      min-width:52px;
      text-align:center;
    }

    .dval {
      font-size:.87em;
      line-height:1.65;
      padding-top:2px;
    }
    .dval.big {
      color:var(--vermillion);
      font-weight:600;
      font-size:.95em;
    }
    .dval.desc {
      border-left:3px solid var(--gold);
      padding-left:10px;
    }

    .feat-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:2px; }
    .feat-tag {
      background:var(--cream);
      border:1px solid var(--gold);
      padding:2px 9px;
      font-size:.75em;
      color:var(--indigo);
    }

    /* ── FOOTER ─────────────────────────────── */
    footer {
      text-align:center;
      padding:18px 10px;
      margin-top:36px;
      border-top:3px double var(--gold);
      font-size:.75em;
      color:var(--dk-gold);
      letter-spacing:.1em;
      line-height:1.9;
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ══ HEADER ══════════════════════════════ -->
  <header>
    <div class="hdr-inner-border">
      <img src="logo_illust.png" alt="名古屋 徒歩探索ルーレット ロゴ">

      <h1>名古屋 <span class="red">徒歩探索</span> ルーレット</h1>

      </div><!-- shachihoko-row -->
    </div>
  </header>

  <!-- ══ WAVE ══════════════════════════════ -->
  <div class="wave">

    </svg>
  </div>

  <!-- ══ CATEGORY ═══════════════════════════ -->
  <section class="cat-section">

      <button class="cat-btn active" data-cat="short"  onclick="selectCat('short')">

  <!-- ══ ROULETTE ════════════════════════════ -->
  <section class="roulette-wrap">
    <div class="wheel-outer">

      <svg class="pointer-svg" width="34" height="56" viewBox="0 0 34 56">
        <!-- gold knob (handle) at top -->
        <circle cx="17" cy="11" r="10" fill="#c8a84b" stroke="#7a5c14" stroke-width="1.5"/>
        <circle cx="17" cy="11" r="5"  fill="#e8c860" stroke="none"/>
        <!-- stem -->
        <rect x="15" y="20" width="4" height="18" fill="#b5332a" stroke="#8c2520" stroke-width=".6"/>
        <!-- downward-pointing arrowhead -->
        <polygon points="17,56 5,36 29,36" fill="#b5332a" stroke="#8c2520" stroke-width="1.2"/>
      </svg>
      <canvas id="wheel" width="310" height="310"></canvas>
    </div>

    <p class="solo-note" id="soloNote" style="display:none">
      このカテゴリはルート1本のみ！回すと必ずそのルートに決定します。
    </p>

    <button class="spin-btn" id="spinBtn" onclick="spin()">
      🦐 ルーレットを回す 🦐
    </button>
  </section>

  <!-- ══ RESULT ══════════════════════════════ -->
  <section class="result-section" id="result">
    <div class="result-hdr">
      <div class="result-badge" id="rBadge">長距離コース</div>
      <div class="result-name"  id="rName">名城線一周</div>
      <div class="result-stars">✦ ✦ ✦</div>
    </div>

    <div class="divider-gold"></div>

    <div class="result-body">
      <div class="result-illus">
        <div id="rIllus"></div>
        <div class="illus-caption" id="rCaption"></div>
      </div>

      <div class="result-details">
        <div class="detail-row">
          <div class="dtag">距　離</div>
          <div class="dval big" id="rDist"></div>
        </div>
        <div class="detail-row">
          <div class="dtag">所要時間</div>
          <div class="dval big" id="rTime"></div>
        </div>
        <div class="detail-row">
          <div class="dtag">最寄駅</div>
          <div class="dval" id="rStation"></div>
        </div>
        <div class="detail-row">
          <div class="dtag">概　要</div>
          <div class="dval desc" id="rDesc"></div>
        </div>
        <div class="detail-row">
          <div class="dtag">特　徴</div>
          <div class="feat-tags" id="rFeat"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ══ WAVE (bottom) ═════════════════════ -->
  <div class="wave" style="transform:scaleY(-1);margin-top:20px;">
    <svg viewBox="0 0 1200 30" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,18 C80,4 160,28 240,18 C320,8 400,28 480,18 C560,8 640,28 720,18 C800,8 880,28 960,18 C1040,8 1120,28 1200,18 L1200,30 L0,30Z" fill="#1a3a5c" opacity=".45"/>
      <path d="M0,23 C100,10 200,30 300,23 C400,16 500,30 600,23 C700,16 800,30 900,23 C1000,16 1100,30 1200,23 L1200,30 L0,30Z" fill="#c8a84b" opacity=".3"/>
    </svg>
  </div>

  <footer>
    🏯 名古屋の道を、一歩一歩 🏯<br>
    伊能忠敬 × 名古屋 長距離ウォーキング探索<br>
    <span style="font-size:.9em;">※ 所要時間・距離は目安です。体調・信号待ち等により前後します。水分補給を忘れずに。</span>
  </footer>

</div><!-- /wrap -->

/* ════════════════════════════════════════
   STATE & CANVAS SETUP
════════════════════════════════════════ */
let currentCat = 'short';
let spinning   = false;
let wheelAngle = 0;

const canvas = document.getElementById('wheel');
const ctx    = canvas.getContext('2d');

const SEG_COLORS  = ['#1a3a5c','#b5332a','#2d6a4f','#c8a84b','#3d6b8f','#7a3c14'];
const TEXT_COLORS = {
  '#1a3a5c':'#f4e8c1','#b5332a':'#f4e8c1','#2d6a4f':'#f4e8c1',
  '#c8a84b':'#2c1810','#3d6b8f':'#f4e8c1','#7a3c14':'#f4e8c1',
};

/* ════════════════════════════════════════
   CATEGORY SELECT
════════════════════════════════════════ */
function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  document.getElementById('soloNote').style.display =
    ROUTES[cat].length === 1 ? 'block' : 'none';
  document.getElementById('result').style.display = 'none';
  wheelAngle = 0;
  drawWheel(0);
}

/* ════════════════════════════════════════
   DRAW WHEEL
════════════════════════════════════════ */
function drawWheel(rot) {
  const list = ROUTES[currentCat];
  const n    = list.length;
  const seg  = (2 * Math.PI) / n;
  const cx   = canvas.width  / 2;
  const cy   = canvas.height / 2;
  const R    = cx - 12;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* rim ring */
  ctx.beginPath();
  ctx.arc(cx, cy, R + 10, 0, 2 * Math.PI);
  ctx.fillStyle = '#9e7b2a';
  ctx.fill();

  /* decorative dots on rim */
  const dotCount = Math.max(24, n * 6);
  for (let i = 0; i < dotCount; i++) {
    const a   = (i / dotCount) * 2 * Math.PI + rot;
    const dx  = cx + (R + 6) * Math.cos(a);
    const dy  = cy + (R + 6) * Math.sin(a);
    ctx.beginPath();
    ctx.arc(dx, dy, 2.2, 0, 2 * Math.PI);
    ctx.fillStyle = i % 3 === 0 ? '#2c1810' : '#f4e8c1';
    ctx.fill();
  }

  /* segments */
  for (let i = 0; i < n; i++) {
    const sa  = rot + i * seg;
    const ea  = sa + seg;
    const col = SEG_COLORS[i % SEG_COLORS.length];

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, sa, ea);
    ctx.closePath();
    ctx.fillStyle = col;
    ctx.fill();
    ctx.strokeStyle = '#c8a84b';
    ctx.lineWidth   = 1.8;
    ctx.stroke();

    /* subtle spoke lines */
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, sa, ea);
    ctx.closePath();
    ctx.clip();
    for (let k = 0; k < 8; k++) {
      const pa = sa + (k / 8) * seg;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + R * Math.cos(pa), cy + R * Math.sin(pa));
      ctx.strokeStyle = 'rgba(255,255,255,.07)';
      ctx.lineWidth   = 5;
      ctx.stroke();
    }
    ctx.restore();

    /* text */
    const mid   = sa + seg / 2;
    const tr    = R * 0.60;
    const tx    = cx + tr * Math.cos(mid);
    const ty    = cy + tr * Math.sin(mid);
    const tCol  = TEXT_COLORS[col] || '#f4e8c1';

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid + Math.PI / 2);
    ctx.fillStyle   = tCol;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';

    const label = list[i].name;
    const chunkLen = 6;
    if (label.length <= chunkLen) {
      ctx.font = 'bold 14px "Noto Serif JP",serif';
      ctx.fillText(label, 0, 0);
    } else {
      ctx.font = 'bold 12px "Noto Serif JP",serif';
      const lines = [];
      for (let c = 0; c < label.length; c += chunkLen) {
        lines.push(label.slice(c, c + chunkLen));
      }
      const lh   = 15;
      const base = -((lines.length - 1) * lh) / 2;
      lines.forEach((ln, li) => ctx.fillText(ln, 0, base + li * lh));
    }
    ctx.restore();
  }

  /* center hub */
  ctx.beginPath();
  ctx.arc(cx, cy, 30, 0, 2 * Math.PI);
  ctx.fillStyle   = '#c8a84b';
  ctx.fill();
  ctx.strokeStyle = '#2c1810';
  ctx.lineWidth   = 2.5;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
  ctx.fillStyle   = '#f4e8c1';
  ctx.fill();
  ctx.strokeStyle = '#9e7b2a';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  /* compass cross in hub */
  [0, Math.PI/2, Math.PI, 3*Math.PI/2].forEach(a => {
    ctx.beginPath();
    ctx.moveTo(cx + 6 * Math.cos(a), cy + 6 * Math.sin(a));
    ctx.lineTo(cx + 17 * Math.cos(a), cy + 17 * Math.sin(a));
    ctx.strokeStyle = '#1a3a5c';
    ctx.lineWidth   = 1.8;
    ctx.stroke();
  });
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
  ctx.fillStyle = '#1a3a5c';
  ctx.fill();
}

/* ════════════════════════════════════════
   SPIN
════════════════════════════════════════ */
function spin() {
  if (spinning) return;

  const list = ROUTES[currentCat];
  const n    = list.length;
  const seg  = (2 * Math.PI) / n;

  const winIdx     = Math.floor(Math.random() * n);
  const winMid     = winIdx * seg + seg / 2;
  // ポインターは真上(-π/2)。finalAngle + winMid ≡ -π/2 (mod 2π) になるよう計算
  const baseTarget = -Math.PI / 2 - winMid;
  // 演出用の全周回転を加算（端数ゼロ = 停止位置ずれなし）
  const spins      = 5 + Math.floor(Math.random() * 5); // 5〜9回転
  const delta      = ((baseTarget - wheelAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const finalAngle = wheelAngle + delta + spins * 2 * Math.PI;

  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('result').style.display = 'none';

  const duration  = 4200 + Math.random() * 1600;
  const startTime = performance.now();
  const startAng  = wheelAngle;

  function ease(t){ return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    const p = Math.min((now - startTime) / duration, 1);
    wheelAngle = startAng + (finalAngle - startAng) * ease(p);
    drawWheel(wheelAngle);
    if (p < 1) {
      requestAnimationFrame(frame);
    } else {
      wheelAngle = finalAngle;
      spinning   = false;
      document.getElementById('spinBtn').disabled = false;
      showResult(list[winIdx]);
    }
  }
  requestAnimationFrame(frame);
}

/* ════════════════════════════════════════
   SHOW RESULT
════════════════════════════════════════ */
function showResult(route) {
  document.getElementById('rBadge').textContent   = route.category;
  document.getElementById('rName').textContent    = route.name;
  document.getElementById('rDist').textContent    = route.dist;
  document.getElementById('rTime').textContent    = route.time;
  document.getElementById('rStation').textContent = route.station;
  document.getElementById('rDesc').textContent    = route.desc;
  document.getElementById('rCaption').textContent = '〽 ' + route.name + ' 〽';
  document.getElementById('rFeat').innerHTML      =
    route.feat.map(f => `<span class="feat-tag">${f}</span>`).join('');
  document.getElementById('rIllus').innerHTML     = ILLUS[route.id] || '';

  const el = document.getElementById('result');
  el.style.display = 'block';
  setTimeout(() => el.scrollIntoView({ behavior:'smooth', block:'start' }), 80);
}
