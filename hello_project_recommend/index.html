<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H!P MUSIC SELECTOR</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-deep: #001a4d;
      --blue-mid: #003399;
      --blue-bright: #0066cc;
      --blue-light: #00aaff;
      --blue-pale: #88ccff;
      --white: #ffffff;
      --silver: #c8dff0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #000d2e 0%, #001f6b 40%, #003399 70%, #0055aa 100%);
      min-height: 100vh;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--white);
      overflow-x: hidden;
    }

    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 60%, rgba(180,220,255,.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 30%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 80%, rgba(200,230,255,.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(180,220,255,.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 85%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 50%, rgba(200,230,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 35% 45%, rgba(150,200,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 70%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 40%, rgba(200,230,255,.8) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.04) 3px,
        rgba(0,0,0,.04) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 120px;
      position: relative;
      z-index: 2;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 36px 0 28px;
    }

    .badge {
      display: inline-block;
      border: 1px solid rgba(0,170,255,.5);
      border-radius: 100px;
      padding: 4px 16px;
      font-size: .7rem;
      letter-spacing: 4px;
      color: var(--blue-pale);
      margin-bottom: 14px;
      background: rgba(0,60,180,.2);
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 900;
      background: linear-gradient(90deg, #7ec8ff, #ffffff, #00aaff, #ffffff, #7ec8ff);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      letter-spacing: 3px;
      line-height: 1.2;
    }

    @keyframes shimmer {
      0% { background-position: 0% }
      100% { background-position: 300% }
    }

    .subtitle {
      margin-top: 10px;
      font-size: .85rem;
      color: var(--blue-pale);
      letter-spacing: 2px;
    }

    .deco-line {
      width: 200px;
      height: 1px;
      margin: 18px auto 0;
      background: linear-gradient(90deg, transparent, var(--blue-light), transparent);
    }

    /* ── CARD ── */
    .card {
      background: rgba(0, 30, 100, .45);
      border: 1px solid rgba(0, 150, 255, .25);
      border-radius: 18px;
      padding: 28px 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0,80,255,.15), inset 0 1px 0 rgba(255,255,255,.08);
      margin-bottom: 18px;
    }

    .section-label {
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: 4px;
      color: var(--blue-pale);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(0,170,255,.4), transparent);
    }

    /* ── SENTENCE UI ── */
    .sentence {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 8px;
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      font-weight: 700;
      line-height: 1.8;
      margin-bottom: 4px;
    }

    .select-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      color: var(--blue-light);
      pointer-events: none;
      font-size: .85rem;
    }

    select.inline-select {
      appearance: none;
      -webkit-appearance: none;
      background: rgba(0,60,200,.35);
      border: 1.5px solid rgba(0,170,255,.5);
      border-radius: 10px;
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: clamp(.9rem, 3vw, 1.1rem);
      font-weight: 700;
      padding: 8px 36px 8px 14px;
      cursor: pointer;
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
      box-shadow: 0 0 0 0 rgba(0,170,255,0);
    }

    select.inline-select:focus,
    select.inline-select:hover {
      border-color: var(--blue-light);
      background: rgba(0,90,230,.45);
      box-shadow: 0 0 16px rgba(0,170,255,.3);
    }

    select.inline-select option {
      background: #001f6b;
      color: #fff;
    }

    .sentence-suffix {
      white-space: nowrap;
    }

    /* ── SEARCH BUTTON ── */
    .btn-search {
      width: 100%;
      margin-top: 24px;
      padding: 17px;
      background: linear-gradient(135deg, #0055bb, #0099ee, #0055bb);
      background-size: 200%;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: 4px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(0,120,255,.35), 0 0 0 1px rgba(0,160,255,.25);
      animation: btnGlow 3s ease-in-out infinite;
    }

    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 4px 24px rgba(0,120,255,.35), 0 0 0 1px rgba(0,160,255,.25); }
      50% { box-shadow: 0 4px 36px rgba(0,160,255,.55), 0 0 0 1px rgba(0,200,255,.4); }
    }

    .btn-search:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,160,255,.5), 0 0 0 1px rgba(0,200,255,.4);
    }

    .btn-search:active:not(:disabled) { transform: translateY(0); }

    .btn-search:disabled {
      opacity: .35;
      cursor: not-allowed;
      animation: none;
    }

    /* ── RESULT ── */
    .result { display: none; }
    .result.show {
      display: block;
      animation: fadeUp .5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .song-card {
      display: flex;
      gap: 22px;
      align-items: flex-start;
    }

    @media (max-width: 480px) {
      .song-card { flex-direction: column; align-items: center; }
    }

    .album-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .album-art {
      width: 150px;
      height: 150px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 0 2px rgba(0,170,255,.3);
      display: block;
    }

    .album-glow {
      position: absolute;
      inset: -4px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(0,170,255,.2), transparent);
      pointer-events: none;
    }

    .song-info { flex: 1; }

    .song-artist {
      font-family: 'Orbitron', monospace;
      font-size: .62rem;
      letter-spacing: 3px;
      color: var(--blue-pale);
      margin-bottom: 7px;
    }

    .song-title {
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 18px;
      color: #fff;
    }

    .streaming { display: flex; flex-wrap: wrap; gap: 8px; }

    .s-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border-radius: 100px;
      font-size: .72rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: .3px;
      transition: transform .15s, filter .15s;
      white-space: nowrap;
    }
    .s-btn:hover { transform: translateY(-2px); filter: brightness(1.15); }

    .s-spotify  { background: #1db954; color: #fff; }
    .s-apple    { background: linear-gradient(135deg, #fa233b, #fb5c74); color: #fff; }
    .s-youtube  { background: #ff0000; color: #fff; }
    .s-line     { background: #00b900; color: #fff; }

    .no-result {
      text-align: center;
      padding: 24px 0;
      color: var(--blue-pale);
      font-size: .9rem;
      line-height: 1.8;
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 24px;
      z-index: 50;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      background: linear-gradient(135deg, #ff4fa3, #c120ff, #4f8fff);
      box-shadow: 0 4px 22px rgba(200,50,200,.5);
      animation: fabPulse 2.5s ease-in-out infinite;
      transition: transform .2s;
    }
    .fab:hover { transform: scale(1.12) rotate(8deg); }

    @keyframes fabPulse {
      0%, 100% { box-shadow: 0 4px 22px rgba(200,50,200,.5); }
      50%       { box-shadow: 0 4px 36px rgba(220,80,255,.75), 0 0 50px rgba(200,50,200,.25); }
    }

    /* ── MODAL ── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(6px);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-bg.show { display: flex; }

    .modal {
      background: linear-gradient(160deg, #18003a, #3a006e, #18003a);
      border: 1px solid rgba(255,100,200,.35);
      border-radius: 22px;
      padding: 40px 32px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 60px rgba(200,50,255,.25), inset 0 1px 0 rgba(255,255,255,.08);
      animation: modalIn .3s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(.75); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-emoji { font-size: 2.8rem; margin-bottom: 14px; }

    .modal-q {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .modal-btns { display: flex; gap: 14px; justify-content: center; }

    .btn-yes {
      padding: 12px 28px;
      background: linear-gradient(135deg, #ff4fa3, #ff1493);
      border: none;
      border-radius: 100px;
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(255,60,160,.4);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-yes:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,60,160,.6); }

    .btn-no {
      padding: 12px 28px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 100px;
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .2s;
    }
    .btn-no:hover { background: rgba(255,255,255,.18); transform: translateY(-2px); }

    /* rainbow label for gay bar result */
    .rainbow-label {
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #ff0080, #ff8800, #ffee00, #00cc44, #0088ff, #cc00ff);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2s linear infinite;
    }

    footer {
      text-align: center;
      padding-top: 20px;
      font-size: .7rem;
      color: rgba(100,150,255,.35);
      line-height: 1.8;
    }
  </style>
</head>

</div>

function onSelChange() {
  const x = document.getElementById('sel-x').value;
  const y = document.getElementById('sel-y').value;
  document.getElementById('search-btn').disabled = !(x && y);
}

function search() {
  const selX = document.getElementById('sel-x').value;
  const selY = document.getElementById('sel-y').value;
  const pool = SONGS.filter(s => s.x.includes(selX) && s.y.includes(selY));
  const resultEl = document.getElementById('result');
  const display = document.getElementById('song-display');

  if (!pool.length) {
    display.innerHTML = `<div class="no-result">✦ この組み合わせの曲は見つかりませんでした ✦<br><small>別のタグを試してみてください</small></div>`;
  } else {
    const song = pool[Math.floor(Math.random() * pool.length)];
    display.innerHTML = renderSong(song);
  }

  resultEl.classList.remove('show');
  void resultEl.offsetWidth;
  resultEl.classList.add('show');
  setTimeout(() => resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function renderSong(song, rainbow = false) {
  return `
    ${rainbow ? '<div class="rainbow-label">🏳️‍🌈 GAY BAR SPECIAL PICK 🏳️‍🌈</div>' : ''}
    <div class="song-card">
      <div class="album-wrap">
        <img class="album-art" src="${song.img}" alt="${song.title}"
             onerror="this.src='https://placehold.co/300x300/001a4d/00aaff?text=%E2%99%AA'">
        <div class="album-glow"></div>
      </div>
      <div class="song-info">
        <div class="song-artist">${song.artist}</div>
        <div class="song-title">「${song.title}」</div>
        <div class="streaming">
          <a href="${song.sp}" target="_blank" rel="noopener" class="s-btn s-spotify">▶ Spotify</a>
          <a href="${song.am}" target="_blank" rel="noopener" class="s-btn s-apple">♪ Apple Music</a>
          <a href="${song.yt}" target="_blank" rel="noopener" class="s-btn s-youtube">▶ YouTube</a>
          <a href="${song.lm}" target="_blank" rel="noopener" class="s-btn s-line">♪ LINE MUSIC</a>
        </div>
      </div>
    </div>`;
}

function openModal() {
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function bgClose(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function yesFloor() {
  closeModal();
  const resultEl = document.getElementById('result');
  document.getElementById('song-display').innerHTML = renderSong(SEXY_BOY, true);
  resultEl.classList.remove('show');
  void resultEl.offsetWidth;
  resultEl.classList.add('show');
  setTimeout(() => resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function noFloor() {
  closeModal();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
