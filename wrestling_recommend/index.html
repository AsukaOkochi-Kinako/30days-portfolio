<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤼 プロレス団体診断！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E60026;
      --dark-red: #9B0000;
      --black: #111;
      --yellow: #FFD700;
      --white: #fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Noto Sans JP', 'ヒラギノ角ゴ', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 斜めストライプ背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 18px,
        rgba(230,0,38,0.04) 18px,
        rgba(230,0,38,0.04) 36px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 16px 60px;
      position: relative;
      z-index: 1;
    }

    /* ━━━━━━ HEADER ━━━━━━ */
    header {
      text-align: center;
      padding: 36px 0 20px;
      border-bottom: 5px solid var(--red);
      margin-bottom: 28px;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 0; right: 0;
      height: 3px;
      background: var(--yellow);
    }
    .header-icon {
      font-size: 3.2em;
      display: block;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 12px rgba(230,0,38,0.6));
    }
    header h1 {
      font-size: clamp(1.8em, 5vw, 2.6em);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: 0.03em;
      text-shadow: 3px 3px 0 var(--red), 5px 5px 0 rgba(0,0,0,0.5);
    }
    header h1 span { color: var(--yellow); }
    header p {
      color: #bbb;
      margin-top: 10px;
      font-size: 0.92em;
    }

    /* ━━━━━━ PROGRESS ━━━━━━ */
    .progress-wrap { margin-bottom: 20px; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82em;
      color: #999;
      margin-bottom: 7px;
    }
    .progress-bar {
      width: 100%; height: 10px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--yellow));
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    /* ━━━━━━ QUESTION CARD ━━━━━━ */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .q-card {
      background: rgba(255,255,255,0.04);
      border: 2px solid var(--red);
      border-radius: 14px;
      padding: 36px 28px 32px;
      text-align: center;
      margin-bottom: 18px;
      animation: slideUp 0.32s ease both;
      position: relative;
      overflow: hidden;
    }
    .q-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--red), var(--yellow), var(--red));
    }
    .q-num {
      font-size: 0.78em;
      color: var(--red);
      font-weight: 900;
      letter-spacing: 0.25em;
      margin-bottom: 14px;
    }
    .q-text {
      font-size: clamp(1.15em, 3.5vw, 1.42em);
      font-weight: 700;
      line-height: 1.55;
    }

    /* ━━━━━━ BUTTONS ━━━━━━ */
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 12px;
    }
    .btn {
      padding: 18px 10px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1.25em;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: transform .12s, box-shadow .12s;
      position: relative;
    }
    .btn:active { transform: translateY(4px) !important; }
    .btn-yes {
      background: var(--red);
      color: #fff;
      box-shadow: 0 7px 0 var(--dark-red);
    }
    .btn-yes:hover { transform: translateY(-3px); box-shadow: 0 10px 0 var(--dark-red); }
    .btn-no {
      background: #3a3a3a;
      color: #fff;
      box-shadow: 0 7px 0 #111;
    }
    .btn-no:hover { transform: translateY(-3px); box-shadow: 0 10px 0 #111; }

    /* ━━━━━━ RESULT ━━━━━━ */
    #result { display: none; }

    .res-hero {
      border-radius: 14px;
      padding: 34px 24px 28px;
      text-align: center;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .res-hero::before {
      content: '🏆';
      position: absolute;
      top: -8px; right: 12px;
      font-size: 80px;
      opacity: 0.13;
      line-height: 1;
    }
    .res-label {
      font-size: 0.78em;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.35em;
      margin-bottom: 10px;
    }
    .res-name {
      font-size: clamp(1.8em, 5.5vw, 2.5em);
      font-weight: 900;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.55);
      line-height: 1.2;
    }
    .res-sub {
      color: rgba(255,255,255,0.7);
      font-size: 0.88em;
      margin-top: 6px;
    }

    .res-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .res-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid #3a3a3a;
      border-radius: 11px;
      padding: 16px 14px;
    }
    .res-card h3 {
      font-size: 0.7em;
      color: var(--red);
      letter-spacing: 0.2em;
      margin-bottom: 7px;
    }
    .res-card p { font-size: 1em; font-weight: 700; }

    .res-desc {
      background: rgba(255,255,255,0.06);
      border: 1px solid #3a3a3a;
      border-radius: 11px;
      padding: 18px 16px;
      margin-bottom: 14px;
    }
    .res-desc h3 {
      font-size: 0.7em;
      color: var(--red);
      letter-spacing: 0.2em;
      margin-bottom: 10px;
    }
    .res-desc p { line-height: 1.75; color: #d8d8d8; font-size: 0.93em; }

    .diagram-wrap {
      background: rgba(255,255,255,0.05);
      border: 1px solid #3a3a3a;
      border-radius: 11px;
      padding: 16px 14px;
      margin-bottom: 14px;
    }
    .diagram-wrap h3 {
      font-size: 0.7em;
      color: var(--red);
      letter-spacing: 0.2em;
      margin-bottom: 12px;
    }
    .diagram-svg {
      width: 100%;
      display: block;
    }

    .official-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, var(--red) 0%, #ff4040 100%);
      color: #fff;
      text-decoration: none;
      text-align: center;
      border-radius: 10px;
      font-size: 1.05em;
      font-weight: 900;
      margin-bottom: 14px;
      box-shadow: 0 5px 0 var(--dark-red);
      transition: transform .12s, box-shadow .12s;
      letter-spacing: 0.05em;
    }
    .official-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--dark-red); }

    .score-section {
      background: rgba(255,255,255,0.05);
      border: 1px solid #3a3a3a;
      border-radius: 11px;
      padding: 16px 14px;
      margin-bottom: 14px;
    }
    .score-section h3 {
      font-size: 0.7em;
      color: var(--red);
      letter-spacing: 0.2em;
      margin-bottom: 12px;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .score-label {
      width: 120px;
      font-size: 0.72em;
      color: #aaa;
      text-align: right;
      flex-shrink: 0;
    }
    .score-bar-bg {
      flex: 1;
      height: 13px;
      background: #222;
      border-radius: 99px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
    }
    .score-val {
      width: 28px;
      font-size: 0.75em;
      color: #888;
      flex-shrink: 0;
    }

    .retry-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 2px solid #555;
      color: #999;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.92em;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: 0.05em;
    }
    .retry-btn:hover { border-color: var(--red); color: #fff; }

    /* ━━━━━━ START SPLASH ━━━━━━ */
    #start-screen {
      text-align: center;
      padding: 30px 0;
    }
    .start-illust {
      font-size: 5em;
      margin-bottom: 20px;
      display: block;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(230,0,38,.3)); }
      50%      { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(230,0,38,.7)); }
    }
    .start-lead {
      font-size: 1.08em;
      color: #ccc;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .start-btn {
      display: inline-block;
      padding: 20px 56px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1.3em;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 0 var(--dark-red);
      letter-spacing: 0.08em;
      transition: transform .12s, box-shadow .12s;
    }
    .start-btn:hover { transform: translateY(-3px); box-shadow: 0 11px 0 var(--dark-red); }
    .start-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 var(--dark-red); }
    .promo-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 26px;
    }
    .chip {
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 0.78em;
      font-weight: 700;
      border: 1px solid #555;
      color: #ccc;
    }
  </style>
</head>

  </header>

  <!-- START SCREEN -->

      あなたにぴったりのプロレス団体、<br>
      エース選手＆ヒール選手がわかる！
    </p>
    <button class="start-btn" onclick="startQuiz()">🔥 診断スタート！</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="p-label">第1問</span>
        <span id="p-count">0 / 18</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="p-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="q-card" id="q-card">
      <div class="q-num" id="q-num">Q.1</div>
      <div class="q-text" id="q-text"></div>
    </div>

    <div class="btn-group">
      <button class="btn btn-yes" onclick="answer(true)">✅ YES</button>
      <button class="btn btn-no"  onclick="answer(false)">❌ NO</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result"></div>

</div>

/* ──────────────────────────────────────────
   STATE
────────────────────────────────────────── */
let qIdx = 0;
let scores = {};

function resetScores() {
  scores = {};
  Object.keys(PROMOS).forEach(k => scores[k] = 0);
}

/* ──────────────────────────────────────────
   QUIZ
────────────────────────────────────────── */
function startQuiz() {
  resetScores();
  qIdx = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = QUESTIONS[qIdx];
  document.getElementById('q-num').textContent  = `Q.${qIdx + 1}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('p-label').textContent = `第${qIdx + 1}問`;
  document.getElementById('p-count').textContent = `${qIdx} / ${QUESTIONS.length}`;
  document.getElementById('p-fill').style.width  = `${(qIdx / QUESTIONS.length) * 100}%`;

  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = '';
}

function answer(yes) {
  if (yes) {
    const s = QUESTIONS[qIdx].s;
    Object.keys(s).forEach(k => scores[k] += s[k]);
  }
  qIdx++;
  if (qIdx >= QUESTIONS.length) {
    showResult();
  } else {
    renderQ();
  }
}

/* ──────────────────────────────────────────
   RESULT
────────────────────────────────────────── */
function showResult() {
  document.getElementById('p-fill').style.width = '100%';
  document.getElementById('p-count').textContent = `${QUESTIONS.length} / ${QUESTIONS.length}`;

  const winner = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
  const p = PROMOS[winner];

  document.getElementById('quiz').style.display = 'none';

  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = buildResult(p, winner);

  requestAnimationFrame(() => {
    const maxScore = Math.max(...Object.values(scores));
    Object.keys(PROMOS).forEach(k => {
      const el = document.getElementById(`sbar-${k}`);
      if (el) {
        const pct = maxScore > 0 ? Math.max(0, (scores[k] / maxScore) * 100) : 0;
        el.style.width = pct + '%';
      }
    });
  });
}

function buildResult(p, key) {
  const sorted = Object.keys(scores).sort((a,b) => scores[b] - scores[a]);
  const maxScore = Math.max(...Object.values(scores));

  const scoreRows = sorted.map(k => {
    const pct = maxScore > 0 ? Math.max(0, (scores[k] / maxScore) * 100) : 0;
    return `
      <div class="score-row">
        <div class="score-label">${PROMOS[k].name}</div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" id="sbar-${k}"
               style="width:0%; background:${PROMOS[k].color};"></div>
        </div>
        <div class="score-val">${scores[k]}</div>
      </div>`;
  }).join('');

  return `
    <div class="res-hero" style="background:linear-gradient(135deg, ${p.color} 0%, #111 100%);">
      <div class="res-label">あなたにおすすめの団体は…</div>
      <div class="res-name">${p.name}</div>
      <div class="res-sub">${p.short}</div>
    </div>

    <div class="res-grid">
      <div class="res-card">
        <h3>⭐ エース選手</h3>
        <p>${p.ace}</p>
      </div>
      <div class="res-card">
        <h3>😈 ヒール選手</h3>
        <p>${p.heel}</p>
      </div>
    </div>

    <div class="res-desc">
      <h3>📋 団体について</h3>
      <p>${p.desc}</p>
    </div>

    <div class="diagram-wrap">
      <h3>🗺️ 主要選手 相関図</h3>
      ${buildDiagram(p)}
    </div>

    <a href="${p.url}" target="_blank" rel="noopener" class="official-btn">
      🌐 公式サイトをチェック！
    </a>

    <div class="score-section">
      <h3>📊 スコア内訳</h3>
      ${scoreRows}
    </div>

    <button class="retry-btn" onclick="restart()">🔄 もう一度診断する</button>
  `;
}

function buildDiagram(p) {
  const W = 500, H = 270;
  const R = 34;

  const pos = p.nodes.map(n => ({
    ...n,
    px: (n.x / 100) * (W - R*2) + R,
    py: (n.y / 100) * (H - R*2 - 20) + R,
  }));

  const lines = p.edges.map(e => {
    const a = pos[e.a], b = pos[e.b];
    const mx = (a.px + b.px) / 2;
    const my = (a.py + b.py) / 2;
    const isRival = e.type !== 'ally';
    return `
      <line x1="${a.px}" y1="${a.py}" x2="${b.px}" y2="${b.py}"
            stroke="${isRival ? '#FF5555' : '#44CC66'}"
            stroke-width="2"
            stroke-dasharray="${isRival ? '7 3' : 'none'}"
            opacity="0.75"/>
      <rect x="${mx - e.label.length * 3.3}" y="${my - 9}"
            width="${e.label.length * 6.6}" height="14"
            fill="rgba(0,0,0,0.65)" rx="3"/>
      <text x="${mx}" y="${my + 2}"
            fill="${isRival ? '#FF9999' : '#99EE99'}"
            font-size="9" text-anchor="middle"
            font-family="'Noto Sans JP', sans-serif">${e.label}</text>`;
  }).join('');

  const circles = pos.map((n, i) => {
    const isHeel = n.role.includes('ヒール');
    const isAce  = n.role.includes('エース') || n.role.includes('王者');
    const fill   = isHeel ? '#CC2222' : isAce ? p.color : '#555';
    const name1  = n.name.slice(0, 5);
    const name2  = n.name.slice(5);
    return `
      <circle cx="${n.px}" cy="${n.py}" r="${R}" fill="${fill}" opacity="0.92"/>
      <circle cx="${n.px}" cy="${n.py}" r="${R}" fill="none"
              stroke="#fff" stroke-width="1.5" opacity="0.35"/>
      <text x="${n.px}" y="${n.py - (name2 ? 6 : 2)}"
            fill="#fff" font-size="11" text-anchor="middle" font-weight="bold"
            font-family="'Noto Sans JP', sans-serif">${name1}</text>
      ${name2 ? `<text x="${n.px}" y="${n.py + 8}"
                       fill="#fff" font-size="11" text-anchor="middle" font-weight="bold"
                       font-family="'Noto Sans JP', sans-serif">${name2}</text>` : ''}
      <text x="${n.px}" y="${n.py + (name2 ? 22 : 16)}"
            fill="rgba(255,255,255,0.65)" font-size="8" text-anchor="middle"
            font-family="'Noto Sans JP', sans-serif">${n.role}</text>`;
  }).join('');

  const legend = `
    <line x1="10" y1="${H+10}" x2="28" y2="${H+10}" stroke="#44CC66" stroke-width="2"/>
    <text x="32" y="${H+14}" fill="#99EE99" font-size="9" font-family="sans-serif">同士・味方</text>
    <line x1="96" y1="${H+10}" x2="114" y2="${H+10}" stroke="#FF5555" stroke-width="2" stroke-dasharray="7 3"/>
    <text x="118" y="${H+14}" fill="#FF9999" font-size="9" font-family="sans-serif">ライバル・対立</text>`;

  return `<svg class="diagram-svg" viewBox="0 0 ${W} ${H+26}"
              xmlns="http://www.w3.org/2000/svg" style="border-radius:8px; background:rgba(0,0,0,0.3);">
    ${lines}${circles}${legend}
  </svg>`;
}

function restart() {
  resetScores();
  qIdx = 0;
  document.getElementById('result').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  document.getElementById('start-screen').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
