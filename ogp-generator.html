<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OGP Image Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #444;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  gap: 20px;
  font-family: sans-serif;
}
canvas {
  max-width: 100%;
  border: 2px solid #222;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
button {
  padding: 14px 40px;
  background: #FF2D78;
  color: white;
  border: 3px solid #1A0533;
  border-radius: 999px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 4px 4px 0 #1A0533;
  transition: transform 0.1s;
}
button:hover { transform: translate(-2px,-2px); }
p { color: #ddd; font-size: 14px; }
</style>
</head>
<body>
<p>フォント読み込み後に自動描画されます</p>
<canvas id="c" width="1200" height="630"></canvas>
<button onclick="download()">📥 JPGとしてダウンロード</button>

<script>
const W = 1200, H = 630, CX = 600;
const INK = '#1A0533';

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function pill(ctx, cx, cy, text, fontSize) {
  ctx.font = `${fontSize}px "Fredoka One", sans-serif`;
  const tw = ctx.measureText(text).width;
  const pw = tw + 56, ph = fontSize + 20;
  const px = cx - pw / 2, py = cy - ph / 2;
  // shadow
  ctx.fillStyle = INK;
  rr(ctx, px + 4, py + 4, pw, ph, ph / 2); ctx.fill();
  // fill
  ctx.fillStyle = '#FFE000';
  rr(ctx, px, py, pw, ph, ph / 2); ctx.fill();
  // border
  ctx.strokeStyle = INK; ctx.lineWidth = 3;
  rr(ctx, px, py, pw, ph, ph / 2); ctx.stroke();
  // text
  ctx.fillStyle = INK; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, cx, cy + 1);
}

function statCard(ctx, x, y, num, label) {
  const w = 180, h = 100;
  // shadow
  ctx.fillStyle = INK; rr(ctx, x + 5, y + 5, w, h, 16); ctx.fill();
  // card
  ctx.fillStyle = 'white'; rr(ctx, x, y, w, h, 16); ctx.fill();
  ctx.strokeStyle = INK; ctx.lineWidth = 3; rr(ctx, x, y, w, h, 16); ctx.stroke();
  // number
  ctx.font = '52px "Fredoka One", sans-serif';
  ctx.fillStyle = '#FF2D78'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(num, x + w / 2, y + 46);
  // label
  ctx.font = '900 13px "Nunito", sans-serif';
  ctx.fillStyle = INK;
  ctx.fillText(label.toUpperCase(), x + w / 2, y + 80);
}

async function draw() {
  // Canvas はフォントを明示的にロードしないと system font にフォールバックする
  await Promise.all([
    document.fonts.load('64px "Fredoka One"'),
    document.fonts.load('108px "Fredoka One"'),
    document.fonts.load('52px "Fredoka One"'),
    document.fonts.load('22px "Fredoka One"'),
    document.fonts.load('900 25px "Nunito"'),
    document.fonts.load('900 13px "Nunito"'),
    document.fonts.load('700 18px "Nunito"'),
  ]);
  const ctx = document.getElementById('c').getContext('2d');

  // Background
  ctx.fillStyle = '#FFFDF5'; ctx.fillRect(0, 0, W, H);

  // Dot pattern
  for (let x = 0; x <= W; x += 48) for (let y = 0; y <= H; y += 48) {
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2);
    ctx.fillStyle = '#FFB347'; ctx.globalAlpha = 0.1; ctx.fill();
  }
  for (let x = 24; x <= W; x += 48) for (let y = 24; y <= H; y += 48) {
    ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI*2);
    ctx.fillStyle = '#FF2D78'; ctx.globalAlpha = 0.08; ctx.fill();
  }
  ctx.globalAlpha = 1;


  // Badge
  pill(ctx, CX, 78, '🎉 Day 30 Complete', 22);

  // Title line 1
  ctx.font = '64px "Fredoka One", sans-serif';
  ctx.fillStyle = INK; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('30 Days of Building with', CX, 188);

  // Title line 2 "Claude"
  ctx.font = '108px "Fredoka One", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.strokeStyle = INK; ctx.lineWidth = 7; ctx.lineJoin = 'round';
  ctx.strokeText('Claude', CX, 308);
  ctx.fillStyle = '#FF2D78'; ctx.fillText('Claude', CX, 308);

  // Sub text
  ctx.font = '700 25px "Nunito", "Noto Sans JP", sans-serif';
  ctx.fillStyle = '#555'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('毎日1プロダクト。30日間、Claude Codeと一緒に作り続けた記録。', CX, 368);

  // Stats
  const cards = [['30','Days'],['30','Products'],['8','Categories']];
  const totalW = 3 * 180 + 2 * 28;
  let sx = CX - totalW / 2;
  cards.forEach(([n, l]) => { statCard(ctx, sx, 400, n, l); sx += 208; });

  // URL
  ctx.font = '700 18px "Nunito", "Noto Sans JP", sans-serif';
  ctx.fillStyle = '#aaa'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('asukaokochi-kinako.github.io/30days-portfolio', CX, 572);
}

function download() {
  const a = document.createElement('a');
  a.download = 'ogp.png';
  a.href = document.getElementById('c').toDataURL('image/png');
  a.click();
}

draw();
</script>
</body>
</html>
