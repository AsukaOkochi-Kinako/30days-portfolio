<html lang="ja">
<head>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: linear-gradient(145deg, #ffffff 0%, #f0f4ff 45%, #edf6ff 100%);
      font-family: 'Noto Sans JP', sans-serif;
    }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 30;
      padding: 22px 32px;
      display: flex; align-items: center; justify-content: space-between;
      pointer-events: none;
    }
    .logo {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300; font-size: 1.15rem;
      letter-spacing: 0.18em; color: #3a4a6b;
    }
    .logo-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #7aabf7;
      margin-left: 3px; vertical-align: super;
      animation: dotPulse 2.5s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100%{ transform: scale(1); opacity: .9 }
      50%    { transform: scale(1.7); opacity: .4 }
    }
    .hint {
      font-size: 0.7rem; letter-spacing: 0.18em;
      color: rgba(58,74,107,0.38);
    }

    #backBtn {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(120,160,240,0.25);
      border-radius: 40px;
      padding: 9px 28px;
      font-family: inherit; font-size: 0.72rem;
      letter-spacing: 0.16em; color: rgba(58,74,107,0.65);
      cursor: pointer;
      transition: all 0.25s ease;
      display: none;
    }
    #backBtn:hover {
      background: rgba(255,255,255,0.95);
      color: #3a4a6b; border-color: rgba(120,160,240,0.5);
    }

    #bubbleCanvas {
      position: fixed; inset: 0;
    }

    /* ── bubble ── */
    .bubble {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-align: center; flex-direction: column;
      background:
        radial-gradient(ellipse at 34% 26%,
          rgba(255,255,255,0.98) 0%,
          rgba(230,242,255,0.72) 32%,
          rgba(205,228,255,0.42) 68%,
          rgba(185,212,255,0.2) 100%);
      border: 1.5px solid rgba(255,255,255,0.92);
      box-shadow:
        0 3px 28px rgba(100,150,255,0.1),
        0 8px 44px rgba(80,130,255,0.07),
        inset 0 2px 4px rgba(255,255,255,0.98),
        inset 0 -2px 6px rgba(160,200,255,0.18);
      user-select: none;
      /* transition only for scale hover; left/top are driven by RAF */
      transition: transform 0.22s ease, box-shadow 0.25s ease;
    }
    .bubble::before {
      content: '';
      position: absolute;
      top: 13%; left: 20%;
      width: 30%; height: 17%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.95) 0%, transparent 100%);
      border-radius: 50%;
      pointer-events: none;
    }
    .bubble::after {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      background: conic-gradient(
        from 160deg,
        rgba(200,220,255,0) 0%,
        rgba(180,240,255,0.16) 22%,
        rgba(220,200,255,0.1) 44%,
        rgba(180,240,220,0.08) 62%,
        rgba(200,220,255,0) 82%
      );
      pointer-events: none;
    }
    .bubble:hover {
      transform: scale(1.08) !important;
      box-shadow:
        0 4px 34px rgba(100,150,255,0.2),
        0 12px 56px rgba(80,130,255,0.14),
        inset 0 2px 4px rgba(255,255,255,0.98),
        inset 0 -2px 6px rgba(160,200,255,0.28);
    }
    .bubble-label {
      position: relative; z-index: 1;
      font-size: 0.86rem; font-weight: 400;
      color: #364060; letter-spacing: 0.07em;
      line-height: 1.38; pointer-events: none;
    }
    .bubble-label .sub {
      display: block; font-size: 0.57rem;
      color: rgba(54,64,96,0.45); margin-top: 3px;
      letter-spacing: 0.1em;
    }
    .bubble.root .bubble-label { font-size: 1rem; font-weight: 300; }

    /* pop-out animation (does NOT use translate so it won't conflict) */
    @keyframes scaleOut {
      0%  { transform: scale(1); opacity: 1; }
      45% { transform: scale(1.12); opacity: 0.65; }
      100%{ transform: scale(0);   opacity: 0; }
    }
    .bubble.popping {
      animation: scaleOut 0.36s ease-in forwards !important;
      pointer-events: none !important;
    }

    /* result overlay */
    #result {
      position: fixed; inset: 0; z-index: 40;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      padding: 76px 20px 40px;
      background: rgba(246,249,255,0.9);
      backdrop-filter: blur(18px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #result.visible { opacity: 1; pointer-events: all; }

    .result-card {
      width: 100%; max-width: 540px;
      margin: 0 auto;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(160,190,255,0.22);
      border-radius: 28px; overflow: hidden;
      box-shadow: 0 8px 60px rgba(80,120,255,0.1);
      animation: cardIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .result-bar { height: 3px; width: 100%; }
    .result-body { padding: 34px 36px 30px; }

    .res-nat { font-size: 0.67rem; letter-spacing: 0.24em; color: rgba(58,74,107,0.45); margin-bottom: 6px; }
    .res-name {
      font-family: 'Noto Serif JP', serif; font-weight: 300;
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      letter-spacing: 0.08em; color: #2a3550; line-height: 1.2;
    }
    .res-name-en { font-size: 0.82rem; font-weight: 300; color: rgba(58,74,107,0.5); letter-spacing: 0.1em; margin-top: 4px; }
    .res-period {
      display: inline-block; margin-top: 12px;
      font-size: 0.68rem; letter-spacing: 0.12em; color: #6b8fcf;
      padding: 4px 14px; border: 1px solid rgba(107,143,207,0.3);
      border-radius: 20px; background: rgba(107,143,207,0.07);
    }
    .res-desc { margin-top: 20px; font-size: 0.85rem; font-weight: 300; line-height: 1.95; color: rgba(42,53,80,0.78); letter-spacing: 0.03em; }
    .res-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 18px; }
    .tag { font-size: 0.68rem; letter-spacing: 0.1em; padding: 4px 13px; border-radius: 20px; background: rgba(100,140,240,0.07); border: 1px solid rgba(100,140,240,0.18); color: rgba(58,74,107,0.6); }
    .res-works-label { margin-top: 22px; font-size: 0.66rem; letter-spacing: 0.22em; color: #7aabf7; margin-bottom: 9px; }
    .res-works { display: flex; flex-wrap: wrap; gap: 7px; }
    .work { font-size: 0.76rem; font-weight: 300; padding: 6px 15px; border-radius: 20px; background: rgba(122,171,247,0.09); border: 1px solid rgba(122,171,247,0.22); color: rgba(42,53,80,0.72); letter-spacing: 0.04em; }
    .res-wiki {
      display: inline-flex; align-items: center; gap: 7px;
      margin-top: 22px; font-size: 0.75rem; letter-spacing: 0.1em;
      color: #6b8fcf; text-decoration: none;
      padding: 9px 20px; border: 1px solid rgba(107,143,207,0.3);
      border-radius: 30px; background: rgba(107,143,207,0.06);
      transition: all 0.25s ease;
    }
    .res-wiki:hover { background: rgba(107,143,207,0.14); border-color: rgba(107,143,207,0.5); color: #3a5faa; }
    .res-path {
      margin-top: 18px; padding: 12px 15px;
      background: rgba(200,215,255,0.1); border: 1px solid rgba(180,200,255,0.2);
      border-radius: 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 5px;
    }
    .path-lbl { font-size: 0.62rem; letter-spacing: 0.18em; color: rgba(58,74,107,0.38); width: 100%; margin-bottom: 3px; }
    .path-step { font-size: 0.72rem; color: rgba(58,74,107,0.55); letter-spacing: 0.05em; }
    .path-arrow { font-size: 0.55rem; color: #7aabf7; opacity: 0.7; }
    .res-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-retry {
      flex: 1; font-family: inherit; font-size: 0.75rem; letter-spacing: 0.16em;
      padding: 11px 20px; border-radius: 30px; cursor: pointer;
      background: rgba(122,171,247,0.12); border: 1px solid rgba(122,171,247,0.3); color: #4a70b8;
      transition: all 0.25s ease;
    }
    .btn-retry:hover { background: rgba(122,171,247,0.22); border-color: rgba(122,171,247,0.5); }

    @media(max-width:480px){
      .result-body{ padding: 22px 18px 20px; }
      .hint { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ArtBubble<span class="logo-dot"></span></div>
  <div class="hint" id="hintText">シャボン玉をタップして</div>
</header>

<div id="bubbleCanvas"></div>
<button id="backBtn">← 戻る</button>

<div id="result">
  <div class="result-card" id="resultCard">
    <div class="result-bar" id="resultBar"></div>
    <div class="result-body" id="resultBody"></div>
  </div>
</div>

<script>

  higashiyama:{ name:'東山魁夷',        nameEn:'Kaii Higashiyama',       nationality:'日本',        period:'1908–1999',  color:['#34D399','#2DD4BF'], desc:'深い緑の森、静かな湖面、白馬が駆ける幻想の野——。日本の自然に宿る静謐な精神性を日本画で描き続けた昭和を代表する画家。唐招提寺の障壁画など、日本人の自然観を絵画として結晶化した。', keywords:['日本画','自然','静寂','精神性'], works:['道','緑響く','年暮る'], wiki:'https://ja.wikipedia.org/wiki/東山魁夷' },
  pollock:   { name:'ジャクソン・ポロック',nameEn:'Jackson Pollock',      nationality:'アメリカ',    period:'1912–1956',  color:['#F87171','#FB923C'], desc:'キャンバスを床に広げ、絵の具を滴らせ・流し・投げ付ける「ドリッピング」技法で抽象表現主義を体現した画家。描く行為そのものをパフォーマンスとし、制御と偶然が交差する巨大なエネルギーフィールドを生み出した。', keywords:['ドリッピング','アクション・ペインティング','抽象表現主義','偶然性'], works:['No.31','ラベンダー・ミスト','秋のリズム'], wiki:'https://ja.wikipedia.org/wiki/ジャクソン・ポロック' },
  rothko:    { name:'マーク・ロスコ',   nameEn:'Mark Rothko',            nationality:'アメリカ',    period:'1903–1970',  color:['#DC2626','#9333EA'], desc:'巨大なカンバスに浮かぶ柔らかな矩形の色彩——見る者を内側から揺さぶるカラーフィールド絵画の巨匠。「私が描くのは人間の根本的な感情——悲劇、陶酔、運命だ」。作品の前で泣く観客が後を絶たなかった。', keywords:['カラーフィールド','崇高','感情','沈黙'], works:['シーグラム壁画','No.61（赤・茶・黒）','チャペル'], wiki:'https://ja.wikipedia.org/wiki/マーク・ロスコ' },
  hasegawa:  { name:'長谷川等伯',       nameEn:'Tōhaku Hasegawa',        nationality:'日本',        period:'1539–1610',  color:['#94A3B8','#CBD5E1'], desc:'水墨画の最高傑作「松林図屏風」を描いた安土桃山時代の絵師。霧の中に浮かぶ松の木々——余白こそが空気であり沈黙であることを知らしめ、描かないことの力で見る者の想像を無限に広げる。', keywords:['水墨画','余白','松林','静寂'], works:['松林図屏風','智積院障壁画','仙人掌群猿図'], wiki:'https://ja.wikipedia.org/wiki/長谷川等伯' },
  kayama:    { name:'加山又造',         nameEn:'Matazo Kayama',          nationality:'日本',        period:'1927–2004',  color:['#60A5FA','#818CF8'], desc:'金銀箔と岩絵具を駆使し、月・雪・波・獣を幻想的に描いた日本画家。古典と前衛の双方を吸収し、装飾性と精神性を高次元で融合させた独自の世界を確立した。', keywords:['日本画','金箔','装飾','月'], works:['冬の海','千羽鶴','雪月花'], wiki:'https://ja.wikipedia.org/wiki/加山又造' },
};

// ─── DECISION TREE ────────────────────────────────────────────────────────────
const ROOT = {
  id:'root', label:'感触は？', sub:'絵の素材感',
  children:[
    { id:'paint',   label:'塗る',  sub:'筆・絵の具',
      children:[
        { id:'vivid',  label:'鮮やか', sub:'大胆な色彩',
          children:[ {id:'kusama',label:'生命・反復'}, {id:'kahlo',label:'感情・人物'}, {id:'miro',label:'夢・遊び'} ]},
        { id:'gentle', label:'幻想的', sub:'柔らかなトーン',
          children:[ {id:'monet',label:'光・瞬間'}, {id:'rousseau',label:'物語・純粋'} ]},
        { id:'deep',   label:'重厚',  sub:'深みのある質感',
          children:[ {id:'klimt',label:'装飾・象徴'}, {id:'magritte',label:'逆説・夢'} ]},
      ]},
    { id:'collage', label:'切貼る', sub:'紙・コラージュ',
      children:[
        { id:'warm',    label:'温かみ', sub:'素朴で親しみやすい',
          children:[ {id:'ericcarle',label:'動植物・物語'}, {id:'matisse',label:'喜び・色彩'} ]},
        { id:'stylish', label:'洗練',  sub:'スタイリッシュ',
          children:[ {id:'murakami',label:'文化・サブカル'} ]},
        { id:'raw',     label:'熱量',  sub:'混沌・エネルギー',
          children:[ {id:'basquiat',label:'都市・告発'} ]},
      ]},
    { id:'draw',    label:'描く',  sub:'線・ペン',
      children:[
        { id:'detailed',  label:'緻密',  sub:'細密で繊細',
          children:[ {id:'yamaguchi',label:'歴史・再解釈'}, {id:'hokusai',label:'波・自然'} ]},
        { id:'bold',      label:'大胆',  sub:'シンプルな線',
          children:[ {id:'nara',label:'子供・内面'}, {id:'warhol',label:'複製・アイコン'} ]},
        { id:'geometric', label:'幾何学', sub:'構成的',
          children:[ {id:'kandinsky',label:'純粋抽象'}, {id:'klee',label:'遊び・哲学'} ]},
      ]},
    { id:'fluid',   label:'流す',  sub:'水・滲み',
      children:[
        { id:'calm',    label:'静寂',  sub:'穏やかに広がる',
          children:[ {id:'higashiyama',label:'日本の自然'}, {id:'rothko',label:'色彩・感情空間'} ]},
        { id:'dynamic', label:'激流',  sub:'勢いよく弾ける',
          children:[ {id:'pollock',label:'アクション・偶然'} ]},
        { id:'zen',     label:'余白',  sub:'東洋的・墨',
          children:[ {id:'hasegawa',label:'墨・霧'}, {id:'kayama',label:'月・金箔'} ]},
      ]},
  ]
};

// ─── STATE ────────────────────────────────────────────────────────────────────
const canvas  = document.getElementById('bubbleCanvas');
const backBtn = document.getElementById('backBtn');
let level    = 0;
let path     = [];          // [{id, label}]
let liveBubbles = [];       // { el, stopFloat }

// ─── SIZES ────────────────────────────────────────────────────────────────────
const SZ = [128, 100, 86]; // size by level

// ─── FLOAT: xFrac/yFrac are 0-1 fractions of canvas size ─────────────────────
// Reads canvas dimensions every tick → automatically adapts to resize
function startFloat(el, xFrac, yFrac, sz) {
  const pX = Math.random() * Math.PI * 2;
  const pY = Math.random() * Math.PI * 2;
  const aX = 18 + Math.random() * 22;
  const aY = 14 + Math.random() * 20;
  const tX = 5  + Math.random() * 4;
  const tY = 4  + Math.random() * 5;
  const t0 = performance.now();
  let raf;

  function tick(now) {
    const W  = canvas.clientWidth;
    const H  = canvas.clientHeight;
    const cx = xFrac * W;
    const cy = yFrac * H;
    const t  = (now - t0) / 1000;
    const dx = aX * Math.sin(2 * Math.PI / tX * t + pX);
    const dy = aY * Math.sin(2 * Math.PI / tY * t + pY);
    const half = sz / 2;
    // clamp so bubble never leaves the viewport
    const fx = Math.max(half, Math.min(W - half, cx + dx));
    const fy = Math.max(half + 64, Math.min(H - half - 64, cy + dy));
    el.style.left = (fx - half) + 'px';
    el.style.top  = (fy - half) + 'px';
    raf = requestAnimationFrame(tick);
  }
  raf = requestAnimationFrame(tick);
  return () => cancelAnimationFrame(raf);
}

// ─── POP-OUT: snapshot current live bubbles, clear list immediately ───────────
function popOutAll() {
  const snapshot = liveBubbles.slice();
  liveBubbles = [];                       // NEW bubbles won't be caught by cleanup
  snapshot.forEach(({ el, stopFloat }) => {
    stopFloat();
    el.classList.add('popping');
    el.style.pointerEvents = 'none';
  });
  setTimeout(() => snapshot.forEach(({ el }) => el.remove()), 380);
}

// ─── CREATE BUBBLE ELEMENT ────────────────────────────────────────────────────
function makeBubble(node, lvl) {
  const el = document.createElement('div');
  el.className = 'bubble' + (lvl === 0 ? ' root' : '');
  const sz = SZ[lvl] ?? 86;
  el.style.width  = sz + 'px';
  el.style.height = sz + 'px';
  el.style.transform = 'scale(0)';
  el.style.opacity   = '0';
  el.innerHTML = `<div class="bubble-label">${node.label}${node.sub && !ARTISTS[node.id] ? `<span class="sub">${node.sub}</span>` : ''}</div>`;
  return el;
}

// ─── SPAWN BUBBLES: positions are {xFrac, yFrac} (0-1) ───────────────────────
function spawnBubbles(nodes, positions, lvl, onClickFn) {
  nodes.forEach((node, i) => {
    const { xFrac, yFrac } = positions[i];
    const sz = SZ[lvl] ?? 86;
    const el = makeBubble(node, lvl);
    const W  = canvas.clientWidth;
    const H  = canvas.clientHeight;
    el.style.left = (xFrac * W - sz / 2) + 'px';
    el.style.top  = (yFrac * H - sz / 2) + 'px';
    canvas.appendChild(el);

    setTimeout(() => {
      el.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.28s ease';
      el.style.transform  = 'scale(1)';
      el.style.opacity    = '1';

      setTimeout(() => {
        el.style.transition = 'transform 0.22s ease, box-shadow 0.25s ease';
        const stop = startFloat(el, xFrac, yFrac, sz);
        liveBubbles.push({ el, stopFloat: stop });
        el.addEventListener('click', () => onClickFn(node, el, xFrac, yFrac));
      }, 420);
    }, i * 60);
  });
}

// ─── SPREAD: in/out as fractions (0-1). radiusFrac = fraction of min(W,H) ─────
function spread(fromXFrac, fromYFrac, n, radiusFrac) {
  const W      = canvas.clientWidth;
  const H      = canvas.clientHeight;
  const fromX  = fromXFrac * W;
  const fromY  = fromYFrac * H;
  const radius = Math.min(W, H) * radiusFrac;
  const base   = fromYFrac < 0.4 ? Math.PI * 0.12 : -Math.PI * 0.12;
  const positions = [];
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI / 2 + base + (2 * Math.PI / n) * i;
    const x = fromX + radius * Math.cos(angle);
    const y = fromY + radius * Math.sin(angle);
    // clamp to safe fraction range, leaving room for header/footer
    positions.push({
      xFrac: Math.max(0.08, Math.min(0.92, x / W)),
      yFrac: Math.max(0.14, Math.min(0.86, y / H)),
    });
  }
  return positions;
}

// ─── PULSE THEN SPLIT ────────────────────────────────────────────────────────
function pulseAndSplit(el, callback) {
  // Briefly scale up the clicked bubble
  el.style.transition = 'transform 0.15s ease';
  el.style.transform  = 'scale(1.18)';
  setTimeout(() => {
    el.style.transform = 'scale(0.92)';
    setTimeout(() => {
      popOutAll();
      callback();
    }, 150);
  }, 150);
}

// ─── LEVEL HANDLERS (all coords are fractions 0-1) ───────────────────────────
function handleRootClick(el, xf, yf) {
  pulseAndSplit(el, () => {
    level = 1;
    updateBack();
    const pos = spread(xf, yf, ROOT.children.length, 0.27);
    spawnBubbles(ROOT.children, pos, 1, (node, el2, x2, y2) => {
      path = [{ id: node.id, label: node.label }];
      handleLevel1Click(node, el2, x2, y2);
    });
    document.getElementById('hintText').textContent = '感触を選んで';
  });
}

function handleLevel1Click(node, el, xf, yf) {
  if (!node.children?.length) return;
  pulseAndSplit(el, () => {
    level = 2;
    updateBack();
    const pos = spread(xf, yf, node.children.length, 0.23);
    spawnBubbles(node.children, pos, 2, (node2, el2, x2, y2) => {
      path = [path[0], { id: node2.id, label: node2.label }];
      handleLevel2Click(node2, el2, x2, y2);
    });
    document.getElementById('hintText').textContent = 'スタイルを選んで';
  });
}

function handleLevel2Click(node, el, xf, yf) {
  if (!node.children?.length) return;
  if (node.children.length === 1 && ARTISTS[node.children[0].id]) {
    pulseAndSplit(el, () => showResult(node.children[0].id));
    return;
  }
  pulseAndSplit(el, () => {
    level = 3;
    updateBack();
    const pos = spread(xf, yf, node.children.length, 0.19);
    spawnBubbles(node.children, pos, 2, (node3, el3) => {
      if (ARTISTS[node3.id]) pulseAndSplit(el3, () => showResult(node3.id));
    });
    document.getElementById('hintText').textContent = 'テーマを選んで';
  });
}

// ─── BACK ─────────────────────────────────────────────────────────────────────
function updateBack() {
  backBtn.style.display = level > 0 ? 'block' : 'none';
}
backBtn.addEventListener('click', () => {
  document.getElementById('result').classList.remove('visible');
  popOutAll();
  level = 0; path = [];
  updateBack();
  document.getElementById('hintText').textContent = 'シャボン玉をタップして';
  setTimeout(init, 120);
});

// ─── RESULT ───────────────────────────────────────────────────────────────────
function showResult(artistId) {
  const a = ARTISTS[artistId];
  if (!a) return;
  document.getElementById('resultBar').style.background = `linear-gradient(90deg,${a.color[0]},${a.color[1]})`;
  const pathHTML = path.map((p, i) =>
    `<span class="path-step">${p.label}</span>${i < path.length - 1 ? '<span class="path-arrow"> ▶ </span>' : ''}`
  ).join('');
  document.getElementById('resultBody').innerHTML = `
    <div class="res-nat">${a.nationality}</div>
    <div class="res-name">${a.name}</div>
    <div class="res-name-en">${a.nameEn}</div>
    <span class="res-period">${a.period}</span>
    <div class="res-desc">${a.desc}</div>
    <div class="res-tags">${a.keywords.map(k=>`<span class="tag">${k}</span>`).join('')}</div>
    <div class="res-works-label">代表作</div>
    <div class="res-works">${a.works.map(w=>`<span class="work">『${w}』</span>`).join('')}</div>
    <a href="${a.wiki}" target="_blank" rel="noopener" class="res-wiki">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      Wikipedia で詳しく見る
    </a>
    ${path.length ? `<div class="res-path"><div class="path-lbl">あなたが辿ったシャボンの道</div>${pathHTML}</div>` : ''}
    <div class="res-actions"><button class="btn-retry" id="retryBtn">もう一度探す</button></div>
  `;
  document.getElementById('result').classList.add('visible');
  document.getElementById('retryBtn').addEventListener('click', restart);
}

// ─── RESTART ──────────────────────────────────────────────────────────────────
function restart() {
  document.getElementById('result').classList.remove('visible');
  popOutAll();
  level = 0; path = [];
  updateBack();
  document.getElementById('hintText').textContent = 'シャボン玉をタップして';
  setTimeout(init, 120);
}

// ─── INIT: show root bubble at canvas center (fracs = 0.5, 0.5) ──────────────
function init() {
  const xFrac = 0.5, yFrac = 0.5;
  const sz = SZ[0];
  const W  = canvas.clientWidth;
  const H  = canvas.clientHeight;
  const el = makeBubble(ROOT, 0);
  el.style.left = (W * xFrac - sz / 2) + 'px';
  el.style.top  = (H * yFrac - sz / 2) + 'px';
  canvas.appendChild(el);

  requestAnimationFrame(() => {
    el.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s ease';
    el.style.transform  = 'scale(1)';
    el.style.opacity    = '1';
    setTimeout(() => {
      el.style.transition = 'transform 0.22s ease, box-shadow 0.25s ease';
      const stop = startFloat(el, xFrac, yFrac, sz);
      liveBubbles.push({ el, stopFloat: stop });
      el.addEventListener('click', () => handleRootClick(el, xFrac, yFrac));
    }, 530);
  });
}

init();
</script>
